services:

  open-webui-cuda:
    image: ghcr.io/open-webui/open-webui:cuda
    container_name: open-webui-cuda
    volumes:
      - open_webui_cuda_data:/app/backend/data
    environment:
      - PORT=${OPEN_WEBUI_PORT}
      - USER_PERMISSIONS_CHAT_MULTIPLE_MODELS=true
      - OAUTH_MERGE_ACCOUNTS_BY_EMAIL=true
      - ENABLE_OAUTH_PERSISTENT_CONFIG=false
      - GITHUB_CLIENT_ID=${OPEN_WEBUI_GITHUB_CLIENT_ID}
      - GITHUB_CLIENT_SECRET=${OPEN_WEBUI_GITHUB_CLIENT_SECRET}
      - OLLAMA_BASE_URL=${OLLAMA_SERVER}
      - RAG_EMBEDDING_ENGINE=ollama
      - RAG_TEXT_SPLITTER=markdown_header
      - CHUNK_MIN_SIZE_TARGET=1000
      - DATABASE_URL=postgresql://postgres:${OPEN_WEBUI_POSTGRESQL_PASSWORD}@localhost:${OPEN_WEBUI_POSTGRESQL_PORT}/openwebui
      - DATABASE_POOL_SIZE=20
      - DATABASE_POOL_MAX_OVERFLOW=10
      - DATABASE_POOL_TIMEOUT=30
      - DATABASE_POOL_RECYCLE=1800
      - VECTOR_DB=pgvector
      - PGVECTOR_DB_URL=postgresql://postgres:${OPEN_WEBUI_POSTGRESQL_PASSWORD}@localhost:${OPEN_WEBUI_POSTGRESQL_PORT}/openwebui
      - DOCLING_SERVER_URL=${DOCLING_SERVER}
    network_mode: host
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    depends_on:
      - postgres

  postgres:
    image: pgvector/pgvector:0.8.2-pg18-trixie
    container_name: postgres
    hostname: postgres
    network_mode: host
    restart: unless-stopped
    command: postgres -c shared_buffers=256MB -c work_mem=16MB -c maintenance_work_mem=128MB -c effective_cache_size=512MB -c max_connections=100
    environment:
      - PGPORT=${OPEN_WEBUI_POSTGRESQL_PORT}
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${OPEN_WEBUI_POSTGRESQL_PASSWORD}
      - POSTGRES_DB=openwebui
      - POSTGRES_MULTIPLE_DATABASES=langflow,linkwarden,n8n
    volumes:
      - postgres_data:/var/lib/postgresql

  copilot-adapter:
    image: gfarfanb/copilot-adapter:1.0.0-beta.2
    container_name: copilot-adapter
    environment:
      - SERVER_PORT=${COPILOT_ADAPTER_PORT}
      - GITHUB_COPILOT_TOKEN=${COPILOT_ADAPTER_GITHUB_TOKEN}
      - COPILOT_API_URL=${COPILOT_ADAPTER_API_URL}
      - COPILOT_API_VERSION=${COPILOT_ADAPTER_API_VERSION}
    network_mode: host
    restart: unless-stopped
    depends_on:
      - redis

  redis:
    image: redis:8.6.2-alpine
    container_name: redis
    network_mode: host
    restart: unless-stopped

  docling-serve-cuda:
    image: quay.io/docling-project/docling-serve-cu128:latest
    container_name: docling-serve-cuda
    environment:
      - UVICORN_PORT=${DOCLING_PORT}
      - DOCLING_SERVE_ENABLE_UI=true
      - DOCLING_SERVE_ENABLE_REMOTE_SERVICES=true
      - DOCLING_SERVE_MAX_SYNC_WAIT=600
      - DOCLING_SERVE_ENG_LOC_NUM_WORKERS=2
      - OMP_NUM_THREADS=4
      - MKL_NUM_THREADS=4
      - UVICORN_WORKERS=1
    network_mode: host
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

volumes:
  open_webui_cuda_data:
  postgres_data:
