services:

  open-webui-cuda:
    image: ghcr.io/open-webui/open-webui:cuda
    container_name: open-webui-cuda
    volumes:
      - open_webui_cuda_data:/app/backend/data
    environment:
      - ENV=dev
      - PORT=${OPEN_WEBUI_PORT}
      - USER_PERMISSIONS_CHAT_MULTIPLE_MODELS=true
      - OAUTH_MERGE_ACCOUNTS_BY_EMAIL=true
      - ENABLE_OAUTH_PERSISTENT_CONFIG=false
      - GITHUB_CLIENT_ID=${OPEN_WEBUI_GITHUB_CLIENT_ID}
      - GITHUB_CLIENT_SECRET=${OPEN_WEBUI_GITHUB_CLIENT_SECRET}
      - OLLAMA_BASE_URL=${OLLAMA_SERVER}
      - RAG_EMBEDDING_ENGINE=ollama
      - RAG_EMBEDDING_MODEL=nomic-embed-text:v1.5
      - RAG_TEXT_SPLITTER=token
      - ENABLE_MARKDOWN_HEADER_TEXT_SPLITTER=true
      - CHUNK_MIN_SIZE_TARGET=1000
      - ENABLE_RAG_WEB_SEARCH=true
      - ENABLE_RAG_LOCAL_WEB_FETCH=true
      - RAG_WEB_SEARCH_ENGINE=searxng
      - RAG_WEB_SEARCH_RESULT_COUNT=3
      - RAG_WEB_SEARCH_CONCURRENT_REQUESTS=10
      - SEARXNG_QUERY_URL=${SEARXNG_SERVER}/search?q=<query>
      - DATABASE_URL=postgresql://${OPEN_WEBUI_POSTGRESQL_USER}:${OPEN_WEBUI_POSTGRESQL_PASSWORD}@${OPEN_WEBUI_POSTGRESQL_SERVER}/${OPEN_WEBUI_DATABASE_NAME}
      - DATABASE_POOL_SIZE=20
      - DATABASE_POOL_MAX_OVERFLOW=10
      - DATABASE_POOL_TIMEOUT=30
      - DATABASE_POOL_RECYCLE=1800
      - VECTOR_DB=pgvector
      - PGVECTOR_DB_URL=postgresql://${OPEN_WEBUI_POSTGRESQL_USER}:${OPEN_WEBUI_POSTGRESQL_PASSWORD}@${OPEN_WEBUI_POSTGRESQL_SERVER}/${OPEN_WEBUI_DATABASE_NAME}
      - CONTENT_EXTRACTION_ENGINE=docling
      - DOCLING_ASYNC=true
      - DOCLING_SERVER_URL=${DOCLING_SERVER}
      - TIKA_SERVER_URL=${TIKA_SERVER}
    network_mode: host
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  copilot-adapter:
    image: gfarfanb/copilot-adapter:1.0.0-beta.6
    container_name: copilot-adapter
    environment:
      - SERVER_PORT=${COPILOT_ADAPTER_PORT}
      - GITHUB_COPILOT_TOKEN=${COPILOT_ADAPTER_GITHUB_TOKEN}
      - COPILOT_API_URL=${COPILOT_ADAPTER_API_URL}
      - COPILOT_API_VERSION=${COPILOT_ADAPTER_API_VERSION}
    network_mode: host
    restart: unless-stopped

  searxng:
    image: searxng/searxng:latest
    container_name: searxng
    volumes:
      - ./searxng:/etc/searxng:rw
    environment:
      - SEARXNG_PORT=${SEARXNG_PORT}
      - SEARXNG_HOST=${SEARXNG_SERVER}
      - SEARXNG_SECRET=${SEARXNG_SECRET}
    network_mode: host
    restart: unless-stopped
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
      - DAC_OVERRIDE
    logging:
      driver: json-file
      options:
        max-size: 1m
        max-file: 1

  docling-serve-cuda:
    image: quay.io/docling-project/docling-serve-cu128:latest
    container_name: docling-serve-cuda
    environment:
      - UVICORN_PORT=${DOCLING_PORT}
      - DOCLING_SERVE_ENABLE_UI=true
      - DOCLING_SERVE_ENABLE_REMOTE_SERVICES=true
      - DOCLING_SERVE_MAX_SYNC_WAIT=1800
      - DOCLING_SERVE_ENG_LOC_NUM_WORKERS=2
      - OMP_NUM_THREADS=4
      - MKL_NUM_THREADS=4
      - UVICORN_WORKERS=1
    network_mode: host
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

volumes:
  open_webui_cuda_data:
